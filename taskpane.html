<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asistente IA (prueba)</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; padding: 16px; color: #1b1b1b; }
    h1 { font-size: 16px; margin: 0 0 4px; }
    .ok { color: #0f6e56; font-weight: 600; }
    .campo { margin-top: 14px; }
    .etiqueta { font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: #6b6b6b; }
    .valor { font-size: 14px; margin-top: 2px; word-break: break-word; }
    .cuerpo { white-space: pre-wrap; max-height: 120px; overflow: auto; background: #f3f3f1;
              border-radius: 8px; padding: 10px; font-size: 13px; line-height: 1.5; }
    .cargando { color: #6b6b6b; font-style: italic; }

    /* --- Acción y borrador --- */
    .barra { margin-top: 18px; display: flex; gap: 8px; flex-wrap: wrap; }
    button { font-family: inherit; font-size: 13px; border-radius: 8px; padding: 8px 14px;
             cursor: pointer; border: 1px solid transparent; }
    button:disabled { opacity: .5; cursor: default; }
    .primario { background: #0f6e56; color: #fff; }
    .primario:hover:not(:disabled) { background: #0c5a47; }
    .secundario { background: #fff; color: #1b1b1b; border-color: #d0d0ce; }
    .secundario:hover:not(:disabled) { background: #f3f3f1; }
    #borradorWrap { margin-top: 14px; display: none; }
    #borrador { width: 100%; box-sizing: border-box; min-height: 180px; resize: vertical;
                font-family: inherit; font-size: 13px; line-height: 1.5; padding: 10px;
                border: 1px solid #d0d0ce; border-radius: 8px; }
    .msg { margin-top: 10px; font-size: 13px; }
    .msg.error { color: #a4262c; }
    .msg.info { color: #6b6b6b; font-style: italic; }
  </style>
</head>
<body>
  <h1>Asistente IA <span class="ok">— ¡funciona!</span></h1>
  <div class="cargando" id="estado">Leyendo el correo abierto…</div>

  <div class="campo"><div class="etiqueta">De</div><div class="valor" id="de">—</div></div>
  <div class="campo"><div class="etiqueta">Asunto</div><div class="valor" id="asunto">—</div></div>
  <div class="campo"><div class="etiqueta">Cuerpo (primeras líneas)</div>
    <div class="valor cuerpo" id="cuerpo">—</div></div>

  <div class="barra">
    <button id="btnProponer" class="primario" disabled>Proponer respuesta</button>
  </div>

  <div id="msg" class="msg"></div>

  <div id="borradorWrap">
    <div class="etiqueta" style="margin-bottom:4px;">Borrador (editable)</div>
    <textarea id="borrador" spellcheck="true"></textarea>
    <div class="barra">
      <button id="btnCopiar" class="secundario">Copiar</button>
      <button id="btnResponder" class="secundario">Insertar en respuesta</button>
    </div>
  </div>

  <script>
    // ====== Configuración ======
    // En desarrollo apunta a tu backend local. Al desplegar a Cloud Run,
    // cambia SOLO esta línea por la URL pública (https://...).
    var BACKEND_URL = "https://encyclopedia-racks-gender-explaining.trycloudflare.com";

    // true  -> al abrir el panel se genera el borrador solo (sin apretar nada).
    // false -> la persona debe apretar "Proponer respuesta".
    var AUTO_PROPONER = true;

    // Guardamos el correo leído para reusarlo al generar el borrador.
    var correo = { from: "", subject: "", body: "" };
    var yaGeneroAlguna = false;

    function $(id) { return document.getElementById(id); }
    function setMsg(texto, tipo) {
      var m = $("msg");
      m.textContent = texto || "";
      m.className = "msg" + (tipo ? " " + tipo : "");
    }

    Office.onReady(function (info) {
      if (info.host !== Office.HostType.Outlook) {
        $("estado").textContent = "Este panel debe abrirse dentro de Outlook.";
        return;
      }
      var item = Office.context.mailbox.item;
      $("estado").textContent = "Office.js conectado correctamente.";

      // Remitente y asunto (disponibles directo en modo lectura)
      var nombre = (item.from && item.from.displayName) || "";
      var email = (item.from && item.from.emailAddress) || "";
      correo.from = (nombre ? nombre + " " : "") + (email ? "<" + email + ">" : "");
      correo.subject = item.subject || "";
      $("de").textContent = correo.from || "—";
      $("asunto").textContent = correo.subject || "(sin asunto)";

      // Conectar botones
      $("btnProponer").addEventListener("click", proponerRespuesta);
      $("btnCopiar").addEventListener("click", copiarBorrador);
      $("btnResponder").addEventListener("click", insertarEnRespuesta);

      // Cuerpo (asíncrono). Cuando llega, recién aquí podemos generar.
      item.body.getAsync(Office.CoercionType.Text, function (res) {
        if (res.status === Office.AsyncResultStatus.Succeeded) {
          correo.body = (res.value || "").trim();
          $("cuerpo").textContent = correo.body.length > 600
            ? correo.body.slice(0, 600) + "…"
            : (correo.body || "(cuerpo vacío)");
          $("btnProponer").disabled = false;

          // Auto-generar solo si hay cuerpo que responder.
          if (AUTO_PROPONER && correo.body) {
            proponerRespuesta();
          }
        } else {
          $("cuerpo").textContent = "No se pudo leer el cuerpo: " + res.error.message;
        }
      });
    });

    // ====== Llamada al backend ======
    async function proponerRespuesta() {
      var btn = $("btnProponer");
      btn.disabled = true;
      setMsg("Generando borrador…", "info");

      try {
        var resp = await fetch(BACKEND_URL + "/api/draft", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            from: correo.from,
            subject: correo.subject,
            body: correo.body
          })
        });

        if (!resp.ok) {
          var errData = {};
          try { errData = await resp.json(); } catch (e) {}
          throw new Error(errData.detail || errData.error || ("HTTP " + resp.status));
        }

        var data = await resp.json();
        $("borrador").value = data.draft || "";
        $("borradorWrap").style.display = "block";

        // Tras el primer borrador, el botón pasa a ser "regenerar".
        if (!yaGeneroAlguna) { btn.textContent = "Proponer de nuevo"; yaGeneroAlguna = true; }

        var cache = data.meta && typeof data.meta.cachedTokens === "number"
          ? " (caché: " + data.meta.cachedTokens + " tokens)" : "";
        setMsg("Borrador listo. Revísalo y edítalo antes de usarlo." + cache, "info");
      } catch (err) {
        var detalle = String(err && err.message ? err.message : err);
        if (detalle === "Failed to fetch") {
          detalle = "no pude conectar con el backend. ¿Está corriendo en " + BACKEND_URL + "?";
        }
        setMsg("Error: " + detalle, "error");
      } finally {
        btn.disabled = false;
      }
    }

    // ====== Acciones sobre el borrador ======
    function copiarBorrador() {
      var ta = $("borrador");
      ta.select();
      navigator.clipboard.writeText(ta.value).then(
        function () { setMsg("Borrador copiado al portapapeles.", "info"); },
        function () {
          try { document.execCommand("copy"); setMsg("Borrador copiado.", "info"); }
          catch (e) { setMsg("No se pudo copiar automáticamente; selecciona y copia a mano.", "error"); }
        }
      );
    }

    function insertarEnRespuesta() {
      var texto = $("borrador").value || "";
      var html = texto
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
        .replace(/\n/g, "<br>");
      Office.context.mailbox.item.displayReplyFormAsync(
        { htmlBody: html },
        function (res) {
          if (res.status === Office.AsyncResultStatus.Succeeded) {
            setMsg("Se abrió una respuesta con el borrador puesto.", "info");
          } else {
            setMsg("No se pudo abrir la respuesta: " + res.error.message, "error");
          }
        }
      );
    }
  </script>
</body>
</html>
