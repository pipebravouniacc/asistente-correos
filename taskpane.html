<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asistente IA (prueba)</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; padding: 16px; color: #1b1b1b; }
    h1 { font-size: 16px; margin: 0 0 4px; }
    .ok { color: #0f6e56; font-weight: 600; }
    .campo { margin-top: 12px; }
    .etiqueta { font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: #6b6b6b; }
    .valor { font-size: 14px; margin-top: 2px; word-break: break-word; }
    .cargando { color: #6b6b6b; font-style: italic; }

    /* --- Consideraciones (plegable) --- */
    .consideraciones { margin-top: 14px; border: 1px solid #e3e3e1; border-radius: 8px; padding: 8px 10px; }
    .consideraciones summary { cursor: pointer; font-size: 13px; font-weight: 600; color: #0f6e56; outline: none; }
    .consideraciones textarea { width: 100%; box-sizing: border-box; min-height: 120px; resize: vertical;
                font-family: inherit; font-size: 13px; line-height: 1.45; padding: 8px; margin-top: 8px;
                border: 1px solid #d0d0ce; border-radius: 6px; }
    .ayuda { font-size: 11px; color: #8a8a8a; margin-top: 4px; }

    /* --- Acción y borrador --- */
    .barra { margin-top: 14px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    button { font-family: inherit; font-size: 13px; border-radius: 8px; padding: 8px 14px;
             cursor: pointer; border: 1px solid transparent; }
    button:disabled { opacity: .5; cursor: default; }
    .primario { background: #0f6e56; color: #fff; }
    .primario:hover:not(:disabled) { background: #0c5a47; }
    .secundario { background: #fff; color: #1b1b1b; border-color: #d0d0ce; }
    .secundario:hover:not(:disabled) { background: #f3f3f1; }
    #borradorWrap { margin-top: 14px; display: none; }
    #borrador { width: 100%; box-sizing: border-box; min-height: 200px; resize: vertical;
                font-family: inherit; font-size: 13px; line-height: 1.5; padding: 10px;
                border: 1px solid #d0d0ce; border-radius: 8px; }
    .msg { margin-top: 10px; font-size: 13px; }
    .msg.error { color: #a4262c; }
    .msg.info { color: #6b6b6b; font-style: italic; }
    .nota { font-size: 12px; }

    /* --- Pie: comprobación de lectura + autoría --- */
    .pie { margin-top: 20px; padding-top: 10px; border-top: 1px solid #ececea; }
    .cuerpoLeido { font-size: 11px; color: #8a8a8a;
                   white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .autoria { margin-top: 6px; font-size: 11px; color: #b0b0b0; }
  </style>
</head>
<body>
  <h1>Asistente IA <span class="ok">— ¡funciona!</span></h1>
  <div class="cargando" id="estado">Leyendo el correo abierto…</div>

  <div class="campo"><div class="etiqueta">De</div><div class="valor" id="de">—</div></div>
  <div class="campo"><div class="etiqueta">Asunto</div><div class="valor" id="asunto">—</div></div>

  <details class="consideraciones" id="consBox">
    <summary>⚙ Consideraciones generales</summary>
    <textarea id="consideraciones" spellcheck="true"
      placeholder="Ej.: Soy secretaria del Magíster en Psicología Clínica. Trato de usted, cercano pero formal. Nunca comprometer plazos sin confirmar con dirección. Derivar consultas de arancel a Finanzas."></textarea>
    <div class="ayuda">Se guardan en este equipo y se aplican a cada respuesta. (Opcional.)</div>
    <div class="barra">
      <button id="btnGuardarCons" class="secundario">Guardar</button>
      <span id="consEstado" class="nota info"></span>
    </div>
  </details>

  <div class="barra">
    <button id="btnProponer" class="primario" disabled>Proponer respuesta</button>
  </div>

  <div id="msg" class="msg"></div>

  <div id="borradorWrap">
    <div class="etiqueta" style="margin-bottom:4px;">Borrador (editable)</div>
    <textarea id="borrador" spellcheck="true"></textarea>
    <div class="barra">
      <button id="btnCopiar" class="secundario">Copiar</button>
      <button id="btnResponder" class="secundario">Insertar en respuesta</button>
    </div>
  </div>

  <div class="pie">
    <div class="cuerpoLeido" id="cuerpoLeido" title="">Cuerpo del correo leído: —</div>
    <div class="autoria">Hecho por Felipe 🍫 (acepta chocolates)</div>
  </div>

  <script>
    // ====== Configuración ======
    // En desarrollo apunta a tu backend (túnel HTTPS o, más adelante, Cloud Run).
    var BACKEND_URL = "https://encyclopedia-racks-gender-explaining.trycloudflare.com";

    // true  -> al abrir el panel se genera el borrador solo (sin apretar nada).
    var AUTO_PROPONER = true;

    // Clave de almacenamiento de las consideraciones (por equipo/navegador).
    var CONS_KEY = "uniacc_consideraciones";

    var correo = { from: "", subject: "", body: "" };
    var yaGeneroAlguna = false;

    function $(id) { return document.getElementById(id); }
    function setMsg(texto, tipo) {
      var m = $("msg");
      m.textContent = texto || "";
      m.className = "msg" + (tipo ? " " + tipo : "");
    }

    // --- Consideraciones: cargar / guardar (localStorage, con red de seguridad) ---
    function cargarConsideraciones() {
      try {
        var v = window.localStorage.getItem(CONS_KEY);
        if (v) $("consideraciones").value = v;
      } catch (e) { /* almacenamiento no disponible: sigue sin persistir */ }
    }
    function guardarConsideraciones(silencioso) {
      try {
        window.localStorage.setItem(CONS_KEY, $("consideraciones").value || "");
        if (!silencioso) {
          var e = $("consEstado");
          e.textContent = "Guardado.";
          setTimeout(function () { e.textContent = ""; }, 2000);
        }
      } catch (e) {
        if (!silencioso) $("consEstado").textContent = "No se pudo guardar en este equipo.";
      }
    }

    Office.onReady(function (info) {
      if (info.host !== Office.HostType.Outlook) {
        $("estado").textContent = "Este panel debe abrirse dentro de Outlook.";
        return;
      }
      var item = Office.context.mailbox.item;
      $("estado").textContent = "Office.js conectado correctamente.";

      // Cargamos las consideraciones YA (sincrónico), así la auto-generación las usa.
      cargarConsideraciones();

      var nombre = (item.from && item.from.displayName) || "";
      var email = (item.from && item.from.emailAddress) || "";
      correo.from = (nombre ? nombre + " " : "") + (email ? "<" + email + ">" : "");
      correo.subject = item.subject || "";
      $("de").textContent = correo.from || "—";
      $("asunto").textContent = correo.subject || "(sin asunto)";

      $("btnProponer").addEventListener("click", proponerRespuesta);
      $("btnCopiar").addEventListener("click", copiarBorrador);
      $("btnResponder").addEventListener("click", insertarEnRespuesta);
      $("btnGuardarCons").addEventListener("click", function () { guardarConsideraciones(false); });

      // Cuerpo (asíncrono). Cuando llega, recién aquí podemos generar.
      item.body.getAsync(Office.CoercionType.Text, function (res) {
        if (res.status === Office.AsyncResultStatus.Succeeded) {
          correo.body = (res.value || "").trim();

          var resumen = correo.body.replace(/\s+/g, " ").trim();
          var corto = resumen.length > 90 ? resumen.slice(0, 90) + "…" : (resumen || "(cuerpo vacío)");
          $("cuerpoLeido").textContent = "Cuerpo del correo leído: " + corto;
          $("cuerpoLeido").title = resumen;

          $("btnProponer").disabled = false;

          if (AUTO_PROPONER && correo.body) {
            proponerRespuesta();
          }
        } else {
          $("cuerpoLeido").textContent = "No se pudo leer el cuerpo: " + res.error.message;
        }
      });
    });

    // ====== Llamada al backend ======
    async function proponerRespuesta() {
      var btn = $("btnProponer");
      btn.disabled = true;
      setMsg("Generando borrador…", "info");

      // Persistimos lo que esté escrito, por si la persona no apretó "Guardar".
      guardarConsideraciones(true);

      try {
        var resp = await fetch(BACKEND_URL + "/api/draft", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            from: correo.from,
            subject: correo.subject,
            body: correo.body,
            consideraciones: $("consideraciones").value || ""
          })
        });

        if (!resp.ok) {
          var errData = {};
          try { errData = await resp.json(); } catch (e) {}
          throw new Error(errData.detail || errData.error || ("HTTP " + resp.status));
        }

        var data = await resp.json();
        $("borrador").value = data.draft || "";
        $("borradorWrap").style.display = "block";

        if (!yaGeneroAlguna) { btn.textContent = "Proponer de nuevo"; yaGeneroAlguna = true; }

        var cache = data.meta && typeof data.meta.cachedTokens === "number"
          ? " (caché: " + data.meta.cachedTokens + " tokens)" : "";
        setMsg("Borrador listo. Revísalo y edítalo antes de usarlo." + cache, "info");
      } catch (err) {
        var detalle = String(err && err.message ? err.message : err);
        if (detalle === "Failed to fetch") {
          detalle = "no pude conectar con el backend. ¿Está corriendo en " + BACKEND_URL + "?";
        }
        setMsg("Error: " + detalle, "error");
      } finally {
        btn.disabled = false;
      }
    }

    // ====== Acciones sobre el borrador ======
    function copiarBorrador() {
      var ta = $("borrador");
      ta.select();
      navigator.clipboard.writeText(ta.value).then(
        function () { setMsg("Borrador copiado al portapapeles.", "info"); },
        function () {
          try { document.execCommand("copy"); setMsg("Borrador copiado.", "info"); }
          catch (e) { setMsg("No se pudo copiar automáticamente; selecciona y copia a mano.", "error"); }
        }
      );
    }

    function insertarEnRespuesta() {
      var texto = $("borrador").value || "";
      var html = texto
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
        .replace(/\n/g, "<br>");
      Office.context.mailbox.item.displayReplyFormAsync(
        { htmlBody: html },
        function (res) {
          if (res.status === Office.AsyncResultStatus.Succeeded) {
            setMsg("Se abrió una respuesta con el borrador puesto.", "info");
          } else {
            setMsg("No se pudo abrir la respuesta: " + res.error.message, "error");
          }
        }
      );
    }
  </script>
</body>
</html>
